# ============================================================
# OAuth Security Lab — Render Blueprint
# Deploy all 5 services with: https://dashboard.render.com/blueprints
# ============================================================

services:

  # ── 1. Authorization Server ───────────────────────────────
  - type: web
    name: oauth-lab-auth
    runtime: docker
    dockerfilePath: ./auth-server/Dockerfile
    dockerContext: ./auth-server
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: JWT_SECRET
        value: render-lab-jwt-secret-change-me-2024
      - key: VULNERABLE_MODE
        value: "true"
      - key: DB_PATH
        value: /tmp/oauth.db

      # internal networking
      - key: AUTH_SERVER_PUBLIC
        value: http://oauth-lab-auth:3001
      - key: CLIENT_BASE_URL
        value: http://oauth-lab-client:3002
      - key: ATTACKER_BASE_URL
        value: http://oauth-lab-attacker:3004
      - key: RESOURCE_SERVER_PUBLIC
        value: http://oauth-lab-resource:3003


  # ── 2. Client Application ────────────────────────────────
  - type: web
    name: oauth-lab-client
    runtime: docker
    dockerfilePath: ./client-app/Dockerfile
    dockerContext: ./client-app
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3002
      - key: CLIENT_ID
        value: legitimate-client
      - key: CLIENT_SECRET
        value: legitimate-secret-abc123

      # internal networking
      - key: CLIENT_BASE_URL
        value: http://oauth-lab-client:3002
      - key: AUTH_SERVER
        value: http://oauth-lab-auth:3001
      - key: AUTH_SERVER_PUBLIC
        value: http://oauth-lab-auth:3001
      - key: RESOURCE_SERVER
        value: http://oauth-lab-resource:3003
      - key: RESOURCE_SERVER_PUBLIC
        value: http://oauth-lab-resource:3003
      - key: ATTACKER_BASE_URL
        value: http://oauth-lab-attacker:3004
      - key: MONITOR_BASE_URL
        value: http://oauth-lab-monitor:3005


  # ── 3. Resource Server ───────────────────────────────────
  - type: web
    name: oauth-lab-resource
    runtime: docker
    dockerfilePath: ./resource-server/Dockerfile
    dockerContext: ./resource-server
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3003
      - key: JWT_SECRET
        value: render-lab-jwt-secret-change-me-2024
      - key: VULNERABLE_MODE
        value: "true"

      # internal networking
      - key: AUTH_SERVER
        value: http://oauth-lab-auth:3001
      - key: AUTH_SERVER_PUBLIC
        value: http://oauth-lab-auth:3001
      - key: RESOURCE_SERVER_PUBLIC
        value: http://oauth-lab-resource:3003

      # update AFTER deployment
      - key: ALLOWED_ORIGINS
        value: PASTE_CLIENT_URL_HERE,PASTE_ATTACKER_URL_HERE


  # ── 4. Attacker Server ───────────────────────────────────
  - type: web
    name: oauth-lab-attacker
    runtime: docker
    dockerfilePath: ./attacker-server/Dockerfile
    dockerContext: ./attacker-server
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3004

      # internal networking
      - key: CLIENT_BASE_URL
        value: http://oauth-lab-client:3002
      - key: AUTH_SERVER_PUBLIC
        value: http://oauth-lab-auth:3001
      - key: RESOURCE_SERVER_PUBLIC
        value: http://oauth-lab-resource:3003
      - key: ATTACKER_BASE_URL
        value: http://oauth-lab-attacker:3004


  # ── 5. Monitoring Dashboard ──────────────────────────────
  - type: web
    name: oauth-lab-monitor
    runtime: docker
    dockerfilePath: ./monitoring-dashboard/Dockerfile
    dockerContext: ./monitoring-dashboard
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3005

      # internal networking
      - key: AUTH_SERVER
        value: http://oauth-lab-auth:3001

